<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NASA Space Defender</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const W=800, H=720;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

// ── Alien type configs ──────────────────────────────
const T={
  scout:  {hp:1, score:10,  col:'#33ff77', sz:17, bspd:3,   bfr:160, bdmg:1, dspd:0.006,  label:'SCOUT'  },
  warrior:{hp:3, score:25,  col:'#ff4455', sz:22, bspd:4,   bfr:100, bdmg:2, dspd:0.0045, label:'WARRIOR'},
  cruiser:{hp:6, score:50,  col:'#cc44ff', sz:29, bspd:3.5, bfr:80,  bdmg:3, dspd:0.003,  label:'CRUISER'},
  boss:   {hp:20,score:200, col:'#ffcc00', sz:44, bspd:5,   bfr:55,  bdmg:4, dspd:0,      label:'BOSS'   }
};

// ── Wave layouts ────────────────────────────────────
const WAVES=[
  [{type:'scout',  rows:3,cols:8}],
  [{type:'scout',  rows:2,cols:8},{type:'warrior',rows:2,cols:6}],
  [{type:'scout',  rows:2,cols:7},{type:'warrior',rows:1,cols:6},{type:'cruiser',rows:1,cols:4}],
  [{type:'boss',   rows:1,cols:1},{type:'warrior',rows:2,cols:6},{type:'scout',  rows:1,cols:7}],
];

// ── Stars ────────────────────────────────────────────
const STARS=Array.from({length:130},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.8+0.2, spd:Math.random()*0.5+0.1, a:Math.random()*0.8+0.2
}));

// ── Game state ───────────────────────────────────────
let state='start';
let score=0, hiScore=+localStorage.getItem('nasaHiScore')||0;
let waveNum=0, lives=3, waveTimer=0;
let player, aliens=[], pBullets=[], aBullets=[], particles=[];
let formX=W/2, formDir=1, formSpd=0.8, diveTimer=180;

// ── Input ─────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(!keys[e.code]){
    if(e.code==='Space'){
      if(state==='start'||state==='gameover'){startGame();return;}
    }
    if(e.code==='KeyP'){
      if(state==='playing') state='paused';
      else if(state==='paused') state='playing';
    }
  }
  keys[e.code]=true;
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── Player ────────────────────────────────────────────
function makePlayer(){
  return {x:W/2,y:H-62,w:44,h:44,hp:5,maxHp:5,fireTimer:0,invincTimer:0,dead:false};
}

function updatePlayer(){
  if(player.dead) return;
  if(keys['ArrowLeft']||keys['KeyA'])  player.x=Math.max(28,player.x-5);
  if(keys['ArrowRight']||keys['KeyD']) player.x=Math.min(W-28,player.x+5);
  if(player.fireTimer>0) player.fireTimer--;
  if((keys['Space']||keys['KeyZ'])&&player.fireTimer===0){
    pBullets.push({x:player.x,y:player.y-28,w:4,h:14,spd:13});
    player.fireTimer=12;
  }
  if(player.invincTimer>0) player.invincTimer--;
}

function drawPlayer(){
  if(player.dead) return;
  if(player.invincTimer>0&&Math.floor(player.invincTimer/4)%2===0) return;
  const x=player.x,y=player.y;
  ctx.save(); ctx.translate(x,y);
  // engine glow
  ctx.fillStyle=`rgba(255,120,0,${0.5+Math.random()*0.3})`;
  ctx.beginPath(); ctx.ellipse(0,19,5,7+Math.random()*3,0,0,Math.PI*2); ctx.fill();
  // tail fins
  ctx.fillStyle='#3366cc';
  ctx.beginPath(); ctx.moveTo(-6,8); ctx.lineTo(-20,22); ctx.lineTo(-9,14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,8);  ctx.lineTo(20,22);  ctx.lineTo(9,14);  ctx.closePath(); ctx.fill();
  // main wings
  ctx.fillStyle='#4477dd';
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-34,18); ctx.lineTo(-10,14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,0);  ctx.lineTo(34,18);  ctx.lineTo(10,14);  ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(9,-10); ctx.lineTo(9,14); ctx.lineTo(-9,14); ctx.lineTo(-9,-10); ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle='#99ddff';
  ctx.beginPath(); ctx.ellipse(0,-14,5,8,0,0,Math.PI*2); ctx.fill();
  // NASA text
  ctx.fillStyle='#002299'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText('NASA',0,7);
  ctx.restore();
}

// ── Alien class ────────────────────────────────────────
class Alien{
  constructor(type,col,row){
    this.type=type; this.col=col; this.row=row;
    const c=T[type];
    this.hp=c.hp; this.maxHp=c.hp; this.sz=c.sz;
    this.color=c.col; this.scoreVal=c.score;
    this.x=0; this.y=0;
    this.fireTimer=Math.floor(Math.random()*c.bfr)+30;
    this.diving=false; this.diveT=0; this.diveP=null;
    this.entered=(type!=='boss');
    this.bossDir=1;
  }
  getFormPos(){return{x:formX+this.col*65,y:95+this.row*55};}
  update(spd){
    const c=T[this.type];
    if(this.type==='boss'){
      if(!this.entered){
        this.y+=1.5; this.x=W/2;
        if(this.y>=95) this.entered=true;
      } else {
        this.x+=1.0*this.bossDir;
        if(this.x>W-80) this.bossDir=-1;
        if(this.x<80)   this.bossDir=1;
        this.y=95;
      }
    } else if(this.diving){
      this.diveT+=c.dspd*spd;
      if(this.diveT>=1){
        this.diving=false; this.diveT=0;
        const fp=this.getFormPos(); this.x=fp.x; this.y=fp.y;
      } else {
        const p=this.diveP,t=this.diveT,mt=1-t;
        this.x=mt*mt*mt*p.x0+3*mt*mt*t*p.cx1+3*mt*t*t*p.cx2+t*t*t*p.x3;
        this.y=mt*mt*mt*p.y0+3*mt*mt*t*p.cy1+3*mt*t*t*p.cy2+t*t*t*p.y3;
      }
    } else {
      const fp=this.getFormPos(); this.x=fp.x; this.y=fp.y;
    }
    if(!this.entered) return;
    if(this.fireTimer>0){this.fireTimer--;}
    else{
      this.fireTimer=c.bfr+Math.floor(Math.random()*60);
      this.shoot();
    }
  }
  shoot(){
    const c=T[this.type];
    if(this.type==='boss'){
      for(let a=-1;a<=1;a++){
        const ang=Math.PI/2+a*0.38;
        aBullets.push({x:this.x,y:this.y+this.sz,vx:Math.cos(ang-Math.PI/2)*c.bspd,vy:c.bspd,w:5,h:12,dmg:c.bdmg,col:'#ff8800'});
      }
    } else if(this.type==='cruiser'){
      for(let a=-1;a<=1;a+=2)
        aBullets.push({x:this.x+a*10,y:this.y+this.sz*0.5,vx:a*1,vy:c.bspd,w:4,h:10,dmg:c.bdmg,col:'#dd88ff'});
    } else {
      aBullets.push({x:this.x,y:this.y+this.sz*0.5,vx:0,vy:c.bspd,w:3,h:9,dmg:c.bdmg,
        col:this.type==='scout'?'#88ff99':'#ff8888'});
    }
  }
  startDive(){
    if(this.diving||this.type==='boss'||!this.entered) return;
    this.diving=true; this.diveT=0;
    const fp=this.getFormPos();
    const side=(Math.random()<0.5?-1:1)*200;
    this.diveP={x0:fp.x,y0:fp.y,cx1:fp.x+side,cy1:fp.y+260,
      cx2:player.x+(Math.random()-0.5)*100,cy2:H-140,x3:fp.x,y3:fp.y};
  }
  draw(){
    ctx.save(); ctx.translate(this.x,this.y);
    switch(this.type){
      case 'scout':   this._drawScout();   break;
      case 'warrior': this._drawWarrior(); break;
      case 'cruiser': this._drawCruiser(); break;
      case 'boss':    this._drawBoss();    break;
    }
    if(this.maxHp>1){
      const bw=this.sz*2.2,bh=4,bx=-this.sz*1.1,by=this.sz+5;
      ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=this.color; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
    ctx.restore();
  }
  _drawScout(){
    const s=this.sz;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*0.7,0); ctx.lineTo(0,s*0.85); ctx.lineTo(-s*0.7,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.moveTo(0,-s*0.45); ctx.lineTo(s*0.32,0); ctx.lineTo(0,s*0.38); ctx.lineTo(-s*0.32,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffff00';
    ctx.beginPath(); ctx.arc(-s*0.26,-s*0.08,s*0.18,0,Math.PI*2); ctx.arc(s*0.26,-s*0.08,s*0.18,0,Math.PI*2); ctx.fill();
  }
  _drawWarrior(){
    const s=this.sz;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6; i===0?ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s):ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6; i===0?ctx.moveTo(Math.cos(a)*s*0.55,Math.sin(a)*s*0.55):ctx.lineTo(Math.cos(a)*s*0.55,Math.sin(a)*s*0.55);}
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-s*0.28,-s*0.18,s*0.2,0,Math.PI*2); ctx.arc(s*0.28,-s*0.18,s*0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f00';
    ctx.beginPath(); ctx.arc(-s*0.28,-s*0.18,s*0.1,0,Math.PI*2); ctx.arc(s*0.28,-s*0.18,s*0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.fillRect(-s*0.1,s*0.4,s*0.2,s*0.42);
  }
  _drawCruiser(){
    const s=this.sz;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.moveTo(-s*0.55,-s*0.42); ctx.lineTo(s*0.55,-s*0.42); ctx.lineTo(s,s*0.42); ctx.lineTo(-s,s*0.42); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-s*0.38,-s*0.22,s*0.76,s*0.48);
    ctx.fillStyle=this.color; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(-s,s*0.28); ctx.lineTo(-s*1.6,s*0.6); ctx.lineTo(-s*0.85,s*0.42); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s,s*0.28);  ctx.lineTo(s*1.6,s*0.6);  ctx.lineTo(s*0.85,s*0.42);  ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-s*0.28,-s*0.08,s*0.19,0,Math.PI*2); ctx.arc(s*0.28,-s*0.08,s*0.19,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aa00ff';
    ctx.beginPath(); ctx.arc(-s*0.28,-s*0.08,s*0.1,0,Math.PI*2); ctx.arc(s*0.28,-s*0.08,s*0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555';
    ctx.fillRect(-s*0.42-2,s*0.38,5,s*0.32); ctx.fillRect(s*0.42-2,s*0.38,5,s*0.32);
  }
  _drawBoss(){
    const s=this.sz;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.ellipse(0,s*0.1,s,s*0.36,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee99';
    ctx.beginPath(); ctx.ellipse(0,-s*0.06,s*0.48,s*0.3,0,Math.PI,Math.PI*2); ctx.fill();
    ctx.strokeStyle=this.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,-s*0.06,s*0.48,s*0.3,0,Math.PI,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(0,s*0.1,s,s*0.36,0,0,Math.PI*2); ctx.stroke();
    for(let i=-2;i<=2;i++){
      ctx.fillStyle=i%2===0?'#ff4400':'#ffff00';
      ctx.beginPath(); ctx.arc(i*s*0.34,s*0.1,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#cc6600';
    ctx.fillRect(-s*0.4-2,s*0.4,5,s*0.26); ctx.fillRect(-2,s*0.4,5,s*0.26); ctx.fillRect(s*0.4-2,s*0.4,5,s*0.26);
    ctx.fillStyle='#ff2200'; ctx.font=`bold ${Math.floor(s*0.27)}px monospace`; ctx.textAlign='center';
    ctx.fillText('BOSS',0,-s*0.22);
  }
}

// ── Particles ─────────────────────────────────────────
function spawnBoom(x,y,col,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:Math.random()*3+1.5,life:50+Math.random()*20|0,maxLife:70,col});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;});
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Formation ─────────────────────────────────────────
function formBounds(){
  const nb=aliens.filter(a=>a.type!=='boss'&&!a.diving);
  if(!nb.length) return{left:0,right:W};
  const mn=Math.min(...nb.map(a=>a.col)),mx=Math.max(...nb.map(a=>a.col));
  return{left:formX+mn*65-32,right:formX+mx*65+32};
}
function updateFormation(spd){
  formX+=formDir*formSpd*spd;
  const b=formBounds();
  if(b.right>W-55){formDir=-1;formX+=(W-55-b.right);}
  if(b.left<55)   {formDir=1; formX-=(b.left-55);}
}

// ── Wave spawn ────────────────────────────────────────
function waveSpeed(){return 1+(waveNum-1)*0.18;}

function spawnWave(){
  aliens=[]; pBullets=[]; aBullets=[]; particles=[];
  diveTimer=180;
  const cfg=WAVES[(waveNum-1)%WAVES.length];
  let row=0;
  cfg.forEach(c=>{
    const off=Math.floor((10-c.cols)/2);
    for(let r=0;r<c.rows;r++){
      for(let cl=0;cl<c.cols;cl++) aliens.push(new Alien(c.type,cl+off,row));
      row++;
    }
  });
  const nb=aliens.filter(a=>a.type!=='boss');
  if(nb.length){
    const mn=Math.min(...nb.map(a=>a.col)),mx=Math.max(...nb.map(a=>a.col));
    formX=W/2-(mn+mx)*65/2;
  } else formX=W/2;
  formDir=1; formSpd=0.8;
}

// ── Collision ─────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax-aw/2<bx+bw/2&&ax+aw/2>bx-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;
}
function doCollisions(){
  // player bullets → aliens
  pBullets=pBullets.filter(b=>{
    for(let i=aliens.length-1;i>=0;i--){
      const a=aliens[i];
      if(!a.entered) continue;
      if(overlap(b.x,b.y,b.w,b.h,a.x,a.y,a.sz*2,a.sz*2)){
        a.hp--;
        spawnBoom(b.x,b.y,'#ffff88',5);
        if(a.hp<=0){
          score+=a.scoreVal;
          if(score>hiScore){hiScore=score;localStorage.setItem('nasaHiScore',hiScore);}
          spawnBoom(a.x,a.y,a.color,14);
          aliens.splice(i,1);
        }
        return false;
      }
    }
    return true;
  });
  // alien bullets → player
  if(player.invincTimer===0&&!player.dead){
    aBullets=aBullets.filter(b=>{
      if(overlap(b.x,b.y,b.w,b.h,player.x,player.y,player.w,player.h)){
        player.hp-=b.dmg;
        spawnBoom(b.x,b.y,'#ff8844',6);
        if(player.hp<=0) killPlayer();
        else player.invincTimer=90;
        return false;
      }
      return true;
    });
    // alien contact
    aliens.forEach(a=>{
      if(!a.entered) return;
      if(overlap(a.x,a.y,a.sz*1.5,a.sz*1.5,player.x,player.y,player.w,player.h)) killPlayer();
    });
  }
}
function killPlayer(){
  if(player.dead) return;
  spawnBoom(player.x,player.y,'#4488ff',20);
  spawnBoom(player.x,player.y,'#ffffff',10);
  lives--;
  if(lives<=0){player.dead=true;state='gameover';localStorage.setItem('nasaHiScore',hiScore);}
  else{player.hp=player.maxHp;player.x=W/2;player.invincTimer=160;}
}

// ── HUD ───────────────────────────────────────────────
function drawHUD(){
  ctx.save();
  ctx.fillStyle='#aaccff'; ctx.font='16px monospace'; ctx.textAlign='left';
  ctx.fillText(`SCORE: ${score}`,15,28);
  ctx.fillStyle='#556677'; ctx.fillText(`HI: ${hiScore}`,15,48);
  ctx.fillStyle='#aaccff'; ctx.textAlign='right';
  ctx.fillText(`WAVE ${waveNum}`,W-15,28);
  // shield bar
  const bw=110,bh=14,bx=W/2-55,by=H-33;
  ctx.fillStyle='#112244'; ctx.fillRect(bx,by,bw,bh);
  for(let i=0;i<player.maxHp;i++){
    ctx.fillStyle=i<player.hp?(player.hp<=1?'#ff3344':'#4499ff'):'#1a1a3a';
    ctx.fillRect(bx+i*(bw/player.maxHp)+1,by+1,bw/player.maxHp-3,bh-2);
  }
  ctx.strokeStyle='#4488bb'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#556677'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('SHIELD',W/2,H-37);
  // lives
  ctx.fillStyle='#556677'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText('LIVES',14,H-37);
  for(let i=0;i<lives;i++) drawMiniShip(18+i*24,H-22);
  ctx.restore();
}
function drawMiniShip(x,y){
  ctx.save(); ctx.translate(x,y); ctx.scale(0.42,0.42);
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(9,-10); ctx.lineTo(9,14); ctx.lineTo(-9,14); ctx.lineTo(-9,-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#4477dd';
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-34,18); ctx.lineTo(-10,14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,0);  ctx.lineTo(34,18);  ctx.lineTo(10,14);  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── Screens ───────────────────────────────────────────
function drawStart(){
  ctx.fillStyle='rgba(0,0,12,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#4488ff'; ctx.font='bold 56px monospace'; ctx.fillText('NASA',W/2,H/2-108);
  ctx.fillStyle='#ffffff'; ctx.font='bold 30px monospace'; ctx.fillText('SPACE DEFENDER',W/2,H/2-62);
  ctx.fillStyle='#556677'; ctx.font='13px monospace'; ctx.fillText('Protect Earth from the alien invasion!',W/2,H/2-20);
  // alien legend
  const leg=[
    {l:'SCOUT',   c:T.scout.col,   p:'10 pts', ox:-215},
    {l:'WARRIOR', c:T.warrior.col, p:'25 pts', ox:-65 },
    {l:'CRUISER', c:T.cruiser.col, p:'50 pts', ox: 85 },
    {l:'BOSS',    c:T.boss.col,    p:'200 pts',ox: 225 },
  ];
  leg.forEach(e=>{
    ctx.fillStyle=e.c; ctx.font='bold 12px monospace'; ctx.fillText(e.l,W/2+e.ox,H/2+38);
    ctx.fillStyle='#445566'; ctx.font='11px monospace'; ctx.fillText(e.p,W/2+e.ox,H/2+54);
  });
  ctx.fillStyle='#334455'; ctx.font='12px monospace';
  ctx.fillText('← → / A D : Move    SPACE : Shoot    P : Pause',W/2,H/2+90);
  if(Math.floor(Date.now()/500)%2===0){
    ctx.fillStyle='#88ccff'; ctx.font='bold 20px monospace';
    ctx.fillText('PRESS SPACE TO START',W/2,H/2+132);
  }
}
function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffffff'; ctx.font='bold 44px monospace'; ctx.fillText('PAUSED',W/2,H/2-18);
  ctx.fillStyle='#668899'; ctx.font='16px monospace'; ctx.fillText('Press P to Resume',W/2,H/2+22);
}
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,12,0.9)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff3333'; ctx.font='bold 54px monospace'; ctx.fillText('GAME OVER',W/2,H/2-80);
  ctx.fillStyle='#aaccff'; ctx.font='24px monospace'; ctx.fillText(`SCORE: ${score}`,W/2,H/2-20);
  ctx.fillStyle='#556677'; ctx.font='18px monospace'; ctx.fillText(`HI SCORE: ${hiScore}`,W/2,H/2+18);
  if(Math.floor(Date.now()/500)%2===0){
    ctx.fillStyle='#88ccff'; ctx.font='bold 18px monospace';
    ctx.fillText('PRESS SPACE TO PLAY AGAIN',W/2,H/2+68);
  }
}
function drawWaveClear(){
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffcc00'; ctx.font='bold 38px monospace'; ctx.fillText(`WAVE ${waveNum} CLEARED!`,W/2,H/2-18);
  ctx.fillStyle='#aaa'; ctx.font='18px monospace'; ctx.fillText(`Score: ${score}`,W/2,H/2+22);
}

// ── Stars ─────────────────────────────────────────────
function updateStars(){
  STARS.forEach(s=>{s.y+=s.spd; if(s.y>H){s.y=0;s.x=Math.random()*W;}});
}
function drawStars(){
  STARS.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

// ── Game control ──────────────────────────────────────
function startGame(){
  score=0; lives=3; waveNum=0;
  player=makePlayer();
  state='playing';
  nextWave();
}
function nextWave(){
  waveNum++;
  spawnWave();
  state='playing';
}

// ── Main loop ─────────────────────────────────────────
function update(){
  updateStars();
  if(state==='playing'){
    const spd=waveSpeed();
    updatePlayer();
    updateFormation(spd);
    // dive trigger
    diveTimer--;
    if(diveTimer<=0){
      diveTimer=Math.max(80,180-waveNum*12);
      const cands=aliens.filter(a=>!a.diving&&a.type!=='boss'&&a.entered);
      if(cands.length){
        const n=Math.min(2,cands.length);
        for(let i=0;i<n;i++){
          const idx=Math.floor(Math.random()*cands.length);
          cands[idx].startDive(); cands.splice(idx,1);
        }
      }
    }
    aliens.forEach(a=>a.update(spd));
    pBullets=pBullets.filter(b=>{b.y-=b.spd;return b.y>-20;});
    aBullets=aBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.y<H+20&&b.x>-20&&b.x<W+20;});
    updateParticles();
    doCollisions();
    if(aliens.length===0&&state==='playing'){state='waveclear';waveTimer=130;}
  } else if(state==='waveclear'){
    updateParticles();
    if(--waveTimer<=0) nextWave();
  } else if(state==='gameover'){
    updateParticles();
  }
}

function draw(){
  ctx.fillStyle='#00000e'; ctx.fillRect(0,0,W,H);
  drawStars();
  if(state==='start'){drawStart();return;}
  // aliens
  aliens.forEach(a=>a.draw());
  // player bullets
  pBullets.forEach(b=>{
    ctx.fillStyle='#88ccff';
    ctx.shadowColor='#4488ff'; ctx.shadowBlur=7;
    ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    ctx.shadowBlur=0;
  });
  // alien bullets
  aBullets.forEach(b=>{
    ctx.fillStyle=b.col;
    ctx.shadowColor=b.col; ctx.shadowBlur=5;
    ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    ctx.shadowBlur=0;
  });
  drawParticles();
  drawPlayer();
  drawHUD();
  if(state==='paused')    drawPause();
  if(state==='gameover')  drawGameOver();
  if(state==='waveclear') drawWaveClear();
}

function loop(){update();draw();requestAnimationFrame(loop);}
player=makePlayer();
loop();
</script>
</body>
